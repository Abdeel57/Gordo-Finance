# Despliegue del frontend en Netlify.
# Define VITE_API_URL en las variables de entorno del sitio.
[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

# SPA: todas las rutas sirven index.html (la navegación es del lado del cliente)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

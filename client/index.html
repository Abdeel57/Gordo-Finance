<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Gordo Finance — Tu dinero hoy</title>
    <meta name="description" content="Gordo Finance: registra tus ingresos y gastos en segundos" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Gordo Finance" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f3f6f4" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0f0d" />
    <style>
      /* Pantalla de carga mostrada mientras arranca la app */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #f3f6f4;
        z-index: 9999;
      }
      #splash img {
        width: min(220px, 56vw);
        height: auto;
        animation: splash-pulse 1.3s ease-in-out infinite;
      }
      #splash .bar {
        width: 44px;
        height: 4px;
        border-radius: 999px;
        background: #067647;
        opacity: 0.35;
        animation: splash-pulse 1.3s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%,
        100% {
          opacity: 0.55;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.04);
        }
      }
      @media (prefers-color-scheme: dark) {
        #splash {
          background: #0a0f0d;
        }
        #splash img {
          filter: brightness(0) invert(1);
        }
        #splash .bar {
          background: #2fbe7d;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <img src="/logo.png" alt="Gordo Finance" />
        <div class="bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
